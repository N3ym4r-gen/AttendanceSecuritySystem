{% extends "base.html" %}

{% block content %}

<div class="form-box">

<h2>Student Login</h2>

<form method="POST">

{{ form.hidden_tag() }}

<p>

{{ form.matric_no.label }}<br>

{{ form.matric_no(size=40) }}

</p>

<p>

{{ form.password.label }}<br>

{{ form.password(size=40) }}

</p>

<p>

{{ form.submit(class="btn") }}

</p>

</form>

</div>

{% endblock %}
